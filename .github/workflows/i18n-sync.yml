name: i18n sync

# Auto-translates EN source files (messages/en/, docs/*.mdx, README.md) into
# ZH/JA/KO/DE/FR after any push to master. Acts as a safety net for contributor
# PRs that didn't run the pre-commit translation hook locally (no LLM_API_KEY).
#
# Idempotent: if the push already contains up-to-date translations (e.g. from
# a local hook run), this workflow detects no diff and exits silently.

on:
  push:
    branches: [master]

concurrency:
  group: i18n-sync-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    # Recursion is prevented by the [skip ci] marker in the auto-commit
    # message (natively honored by GitHub Actions push trigger).

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed EN source files
        id: changes
        run: |
          BEFORE="${{ github.event.before }}"
          # First push to the branch: before is all zeros — diff against empty tree
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE=$(git hash-object -t tree /dev/null)
          fi

          # Locale subdir exclusion (docs/{zh,ja,...} are generated, not sources)
          LOCALE_EXCLUDE=""
          for d in frontend/messages/*/; do
            name=$(basename "$d")
            [ "$name" = "en" ] && continue
            if [ -z "$LOCALE_EXCLUDE" ]; then
              LOCALE_EXCLUDE="^docs/${name}/"
            else
              LOCALE_EXCLUDE="${LOCALE_EXCLUDE}|^docs/${name}/"
            fi
          done

          CHANGED=$(git diff --name-only --diff-filter=ACM "$BEFORE" HEAD \
            | grep -E '^(frontend/messages/en/.*\.json|docs/.*\.mdx|README\.md)$' || true)

          if [ -n "$LOCALE_EXCLUDE" ] && [ -n "$CHANGED" ]; then
            CHANGED=$(echo "$CHANGED" | grep -vE "$LOCALE_EXCLUDE" || true)
          fi

          if [ -z "$CHANGED" ]; then
            echo "No EN source files changed in this push."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changed EN sources:"
            echo "$CHANGED" | sed 's/^/  /'
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            # Use $'\n'-delimited list passed via file to handle paths with spaces safely
            echo "$CHANGED" > /tmp/changed-files.txt
          fi

      - name: Install uv
        if: steps.changes.outputs.has_changes == 'true'
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        if: steps.changes.outputs.has_changes == 'true'
        run: uv python install 3.12

      - name: Install dependencies
        if: steps.changes.outputs.has_changes == 'true'
        run: uv sync --all-extras

      - name: Run translation
        if: steps.changes.outputs.has_changes == 'true'
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          FAST_LLM_MODEL: ${{ secrets.FAST_LLM_MODEL }}
        run: |
          if [ -z "$LLM_API_KEY" ]; then
            echo "::error::LLM_API_KEY secret not set — cannot translate."
            echo "Set repo secret at Settings → Secrets and variables → Actions."
            exit 1
          fi
          # Pass changed files via xargs to handle any volume; translate.py
          # accepts --files with a space-separated list.
          xargs -a /tmp/changed-files.txt uv run scripts/translate.py --files

      - name: Commit and push if translations changed
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No translation diff — locales already up to date."
            exit 0
          fi

          git config user.name  "fim-one-bot"
          git config user.email "bot@fim.ai"

          git add -A
          git commit -m "chore(i18n): sync translations for ${GITHUB_SHA::8} [skip ci]"
          git push origin HEAD:master
        env:
          GITHUB_SHA: ${{ github.sha }}
